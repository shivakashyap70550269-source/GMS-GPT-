<!DOCTYPE html>
<html>
<head>
  <title>GMS GPT</title>
  <style>
    body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
    textarea { width:80%; height:80px; margin:10px; border-radius:10px; padding:10px; }
    button { padding:10px 20px; border-radius:10px; background:#22c55e; color:white; border:none; }
    #response { margin-top:20px; padding:15px; background:#1e293b; border-radius:10px; width:80%; margin:auto; }
  </style>
</head>

<body>

<h1>🤖 GMS GPT</h1>

<textarea id="prompt" placeholder="Ask anything..."></textarea><br>
<button onclick="askAI()">Send</button>

<div id="response"></div>

<script>
async function askAI() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer sk-or-v1-abc123xyz456",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "mistralai/mistral-7b-instruct",
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await res.json();

  document.getElementById("response").innerText =
    data.choices?.[0]?.message?.content || "Error 😢";
}
</script>
</body>
</html>
